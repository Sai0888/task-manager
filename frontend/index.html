<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 30px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 32px;
      color: #f8fafc;
      margin-bottom: 8px;
    }

    .header p {
      color: #94a3b8;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 16px;
      color: #38bdf8;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
    }

    input,
    select {
      flex: 1;
      min-width: 180px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      outline: none;
      font-size: 14px;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus,
    select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-primary {
      background: #0ea5e9;
      color: white;
    }

    .btn-success {
      background: #22c55e;
      color: white;
    }

    .btn-warning {
      background: #f59e0b;
      color: #111827;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-secondary {
      background: #334155;
      color: white;
    }

    .stats-box {
      background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
      border-radius: 14px;
      padding: 18px;
      margin-top: 12px;
      color: white;
      font-weight: 600;
      min-height: 70px;
      display: flex;
      align-items: center;
    }

    .section-title {
      margin: 22px 0 14px;
      color: #f8fafc;
      font-size: 24px;
    }

    #tasks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .task {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
    }

    .task-title {
      font-size: 18px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 8px;
    }

    .task-desc {
      color: #cbd5e1;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge-status {
      background: rgba(59, 130, 246, 0.18);
      color: #93c5fd;
    }

    .badge-priority {
      background: rgba(245, 158, 11, 0.18);
      color: #fcd34d;
    }

    .task-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 20px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px dashed #475569;
      color: #94a3b8;
    }

    @media (max-width: 900px) {
      .grid,
      #tasks {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .header h1 {
        font-size: 26px;
      }

      .card {
        padding: 16px;
      }

      input,
      select,
      .btn {
        width: 100%;
      }

      .form-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Task Manager Dashboard</h1>
      <p>Manage your tasks, filter them, and track your progress.</p>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Create Task</h2>

        <div class="form-row">
          <input id="title" placeholder="Enter task title" />
          <input id="desc" placeholder="Enter task description" />
        </div>

        <div class="form-row">
          <select id="status">
            <option>Todo</option>
            <option>In Progress</option>
            <option>Done</option>
          </select>

          <select id="priority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </div>

        <button class="btn btn-primary" onclick="createTask()">Add Task</button>
      </div>

      <div class="card">
        <h2>Filter & Search</h2>

        <div class="form-row">
          <input id="searchTitle" placeholder="Search by title" />
        </div>

        <div class="form-row">
          <select id="filterStatus">
            <option value="">All Status</option>
            <option>Todo</option>
            <option>In Progress</option>
            <option>Done</option>
          </select>

          <select id="filterPriority">
            <option value="">All Priority</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </div>

        <div class="form-row">
          <button class="btn btn-secondary" onclick="searchTasks()">Search</button>
          <button class="btn btn-success" onclick="loadStats()">Load Analytics</button>
          <button class="btn btn-warning" onclick="loadTasks()">Show All Tasks</button>
        </div>

        <div class="stats-box" id="stats">Click "Load Analytics" to view task statistics.</div>
      </div>
    </div>

    <h2 class="section-title">Your Tasks</h2>
    <div id="tasks"></div>
  </div>

  <script>
    const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY5YzNhMGM2MjNjZGE5YjU2YWY1Y2VlMiIsImlhdCI6MTc3NDQyODUzNX0.U9I1tijuwR5j__UuVFKo8yWVK1uOzAjYFx8Q-1c2dyQ";

    async function createTask() {
      const title = document.getElementById("title").value;
      const description = document.getElementById("desc").value;
      const status = document.getElementById("status").value;
      const priority = document.getElementById("priority").value;

      if (!title.trim()) {
        alert("Please enter a task title");
        return;
      }

      await fetch("http://localhost:5000/api/tasks", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ title, description, status, priority })
      });

      document.getElementById("title").value = "";
      document.getElementById("desc").value = "";

      loadTasks();
      loadStats();
    }

    async function loadTasks() {
      const res = await fetch("http://localhost:5000/api/tasks", {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      const data = await res.json();
      displayTasks(data);
    }

    function displayTasks(tasks) {
      const container = document.getElementById("tasks");
      container.innerHTML = "";

      if (!tasks.length) {
        container.innerHTML = `<div class="empty">No tasks found.</div>`;
        return;
      }

      tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task";

        div.innerHTML = `
          <div class="task-title">${task.title}</div>
          <div class="task-desc">${task.description || "No description provided."}</div>
          <div class="task-meta">
            <span class="badge badge-status">Status: ${task.status}</span>
            <span class="badge badge-priority">Priority: ${task.priority}</span>
          </div>
          <div class="task-actions">
            <button class="btn btn-success" onclick="markDone('${task._id}')">Mark Done</button>
            <button class="btn btn-danger" onclick="deleteTask('${task._id}')">Delete</button>
          </div>
        `;

        container.appendChild(div);
      });
    }

    async function deleteTask(id) {
      await fetch(`http://localhost:5000/api/tasks/${id}`, {
        method: "DELETE",
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      loadTasks();
      loadStats();
    }

    async function markDone(id) {
      await fetch(`http://localhost:5000/api/tasks/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ status: "Done" })
      });

      loadTasks();
      loadStats();
    }

    async function searchTasks() {
      const title = document.getElementById("searchTitle").value;
      const status = document.getElementById("filterStatus").value;
      const priority = document.getElementById("filterPriority").value;

      let url = `http://localhost:5000/api/tasks/search?`;

      if (title) url += `title=${encodeURIComponent(title)}&`;
      if (status) url += `status=${encodeURIComponent(status)}&`;
      if (priority) url += `priority=${encodeURIComponent(priority)}`;

      const res = await fetch(url, {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      const data = await res.json();
      displayTasks(data);
    }

    async function loadStats() {
      const res = await fetch("http://localhost:5000/api/tasks/stats", {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      const data = await res.json();

      document.getElementById("stats").innerText =
        `Total: ${data.total} | Completed: ${data.completed} | Pending: ${data.pending} | Completion Rate: ${data.completionRate}%`;
    }

    loadTasks();
    loadStats();
  </script>
</body>
</html>
